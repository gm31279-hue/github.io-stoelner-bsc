<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23D4006A'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='Arial' font-size='18' font-weight='bold' fill='white'%3ES%3C/text%3E%3C/svg%3E">
<title>Stölner GmbH — Unternehmensscorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --fin:#C0392B;--fin-l:#FDEDEC;--fin-m:#E74C3C;
  --kun:#1A5F9E;--kun-l:#EBF4FB;--kun-m:#2980B9;
  --pro:#C07000;--pro-l:#FEF9EC;--pro-m:#D4AC0D;
  --ler:#1E7A3E;--ler-l:#EAFAF1;--ler-m:#27AE60;
  --ok:#27AE60;--warn:#E67E22;--crit:#E74C3C;
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E8EAF0;
  --text:#1A1D2E;--muted:#6B7280;--accent:#E5007D;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

.app-header{background:var(--surface);border-bottom:2px solid #E5007D;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(229,0,125,.1);}
.header-inner{display:flex;align-items:center;gap:16px;height:56px;max-width:1400px;margin:0 auto;}
.logo{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.logo span{color:var(--accent);}
.year-select{border:1px solid var(--border);background:var(--bg);border-radius:6px;padding:4px 8px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;}
.btn{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s;}
.btn:hover{background:var(--bg);}
.btn-primary{background:#E5007D;color:#fff;border-color:#E5007D;}
.btn-primary:hover{background:#B8005E;}
.btn-danger{background:#E74C3C;color:#fff;border-color:#E74C3C;}
.btn-sm{padding:4px 10px;font-size:12px;}
.header-spacer{flex:1;}
.tab-nav{display:flex;gap:2px;margin-left:12px;}
.tab{padding:8px 13px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);background:transparent;border:none;transition:all .15s;}
.tab:hover{color:var(--text);background:var(--bg);}
.tab.active{background:#E5007D;color:#fff;}

.main{max-width:1400px;margin:0 auto;padding:20px 24px;}
.section{display:none;}
.section.active{display:block;}

/* DASH SUMMARY */
.dash-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;}
.sum-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;}
.sum-val{font-size:28px;font-weight:700;}
.sum-val.ok{color:var(--ok);}
.sum-val.warn{color:var(--warn);}
.sum-val.crit{color:var(--crit);}
.sum-val.neu{color:var(--accent);}
.sum-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* KPI KARTEN MIT ZAHLEN */
.kpi-section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px;}
.kpi-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;}
.kpi-card.fin::before{background:var(--fin);}
.kpi-card.kun::before{background:var(--kun);}
.kpi-card.pro::before{background:var(--pro);}
.kpi-card.ler::before{background:var(--ler);}
.kpi-card-name{font-size:11px;color:var(--muted);margin-bottom:6px;padding-left:4px;}
.kpi-card-vals{display:flex;align-items:baseline;gap:6px;padding-left:4px;margin-bottom:8px;}
.kpi-ist{font-size:22px;font-weight:700;}
.kpi-ist.ok{color:var(--ok);}
.kpi-ist.warn{color:var(--warn);}
.kpi-ist.crit{color:var(--crit);}
.kpi-ziel-txt{font-size:12px;color:var(--muted);}
.kpi-bar-wrap{height:5px;background:var(--bg);border-radius:3px;margin:0 4px;overflow:hidden;}
.kpi-bar{height:100%;border-radius:3px;transition:width .5s ease;}
.kpi-delta{font-size:11px;padding-left:4px;margin-top:5px;}
.kpi-delta.pos{color:var(--ok);}
.kpi-delta.neg{color:var(--crit);}
.kpi-delta.neu{color:var(--warn);}

/* BSC PERSPECTIVES */
.bsc-perspectives{display:flex;flex-direction:column;gap:10px;}
.persp-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.persp-head{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);}
.persp-badge{padding:3px 12px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.persp-badge.fin{background:var(--fin);color:#fff;}
.persp-badge.kun{background:var(--kun);color:#fff;}
.persp-badge.pro{background:var(--pro);color:#fff;}
.persp-badge.ler{background:var(--ler);color:#fff;}
.persp-leitfrage{font-size:11px;color:var(--muted);font-style:italic;}
.persp-goals{display:grid;}
.goal-card{border-right:1px solid var(--border);}
.goal-card:last-child{border-right:none;}
.goal-head{padding:10px 12px 8px;border-bottom:1px solid var(--border);}
.goal-head.fin{background:var(--fin-l);}
.goal-head.kun{background:var(--kun-l);}
.goal-head.pro{background:var(--pro-l);}
.goal-head.ler{background:var(--ler-l);}
.goal-title{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:2px;}
.goal-title.fin{color:var(--fin);}
.goal-title.kun{color:var(--kun);}
.goal-title.pro{color:var(--pro);}
.goal-title.ler{color:var(--ler);}
.goal-sub{font-size:10px;color:var(--muted);}
.goal-body{padding:8px 12px;}
.measure-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:11px;line-height:1.3;}
.measure-row:last-child{margin-bottom:0;}
.m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.m-dot.ok{background:var(--ok);}
.m-dot.warn{background:var(--warn);}
.m-dot.crit{background:var(--crit);}
.m-dot.n{background:#BDC3C7;}
.m-text{flex:1;color:var(--text);}
.m-type{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;flex-shrink:0;margin-top:1px;}
.m-type.sp{background:#FDEDEC;color:var(--crit);}
.m-type.fr{background:#EAFAF1;color:var(--ok);}
.goal-status-bar{height:3px;margin:0 12px 8px;background:var(--bg);border-radius:2px;overflow:hidden;}
.status-bar-fill{height:100%;border-radius:2px;}

/* EDIT */
.edit-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.edit-hint{font-size:12px;color:var(--muted);background:#FDE8F3;border:1px solid #F0B8D8;border-radius:6px;padding:6px 12px;}
.persp-edit{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:12px;overflow:hidden;}
.persp-edit-head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);}
.goals-edit-grid{display:grid;grid-template-columns:repeat(2,1fr);}
.goal-edit{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:14px;}
.goal-edit:nth-child(even){border-right:none;}
.goal-edit:nth-last-child(-n+2){border-bottom:none;}
.field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px;margin-top:10px;}
.field-label:first-child{margin-top:0;}
input[type=text],textarea,select{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--bg);transition:border .15s;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:#E5007D;background:#fff;}
input[type=number]{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--bg);}
.kpi-edit-row{display:grid;grid-template-columns:1fr 1fr 80px;gap:6px;margin-top:6px;}
.kpi-edit-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
.measures-edit{margin-top:6px;}
.me-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.me-row input[type=text]{flex:1;}
.s-select{width:70px!important;flex-shrink:0;}
.t-select{width:65px!important;flex-shrink:0;}
.add-measure-btn{font-size:11px;color:var(--accent);background:none;border:1px dashed var(--accent);border-radius:5px;padding:4px 10px;cursor:pointer;width:100%;margin-top:4px;}
.add-measure-btn:hover{background:#FDE8F3;}
.del-btn{background:none;border:none;color:#BDC3C7;font-size:14px;cursor:pointer;padding:2px;flex-shrink:0;}
.del-btn:hover{color:var(--crit);}
.goal-edit-hdr{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.status-select{padding:3px 6px;border-radius:5px;font-size:11px;font-weight:600;border:1px solid var(--border);cursor:pointer;}
.status-select.ok{background:#EAFAF1;color:var(--ok);}
.status-select.warn{background:#FEF9EC;color:var(--warn);}
.status-select.crit{background:var(--fin-l);color:var(--crit);}
.status-select.n{background:var(--bg);color:var(--muted);}
.ml-auto{margin-left:auto;}
.flex{display:flex;}.items-center{align-items:center;}.gap-6{gap:6px;}.gap-4{gap:4px;}

/* PRÄSENTATION */
.pres-mode{background:#111827;min-height:100vh;padding:32px;color:#fff;}
.pres-header{text-align:center;margin-bottom:28px;}
.pres-title{font-size:24px;font-weight:700;letter-spacing:-.5px;}
.pres-subtitle{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px;}
.pres-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.pres-sum{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;text-align:center;}
.pres-sum-val{font-size:30px;font-weight:700;}
.pres-sum-val.ok{color:#34D399;}
.pres-sum-val.warn{color:#FBBF24;}
.pres-sum-val.crit{color:#F87171;}
.pres-sum-val.neu{color:#60A5FA;}
.pres-sum-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}

/* KPI STREIFEN PRÄSENTATION */
.pres-kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.pres-kpi{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 14px;}
.pres-kpi-name{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:5px;}
.pres-kpi-vals{display:flex;align-items:baseline;gap:6px;margin-bottom:6px;}
.pres-kpi-ist{font-size:20px;font-weight:700;}
.pres-kpi-ist.ok{color:#34D399;}
.pres-kpi-ist.warn{color:#FBBF24;}
.pres-kpi-ist.crit{color:#F87171;}
.pres-kpi-ziel{font-size:11px;color:rgba(255,255,255,.3);}
.pres-kpi-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.pres-kpi-fill{height:100%;border-radius:2px;}
.pres-kpi-delta{font-size:10px;margin-top:4px;}
.pres-kpi-delta.pos{color:#34D399;}
.pres-kpi-delta.neg{color:#F87171;}
.pres-kpi-delta.neu{color:#FBBF24;}

.pres-perspectives{display:flex;flex-direction:column;gap:10px;}
.pres-persp{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.pres-persp-head{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.06);}
.pres-persp-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pres-persp-lf{font-size:10px;color:rgba(255,255,255,.3);font-style:italic;}
.pres-goals{display:grid;}
.pres-goal{padding:10px 16px;border-right:1px solid rgba(255,255,255,.06);}
.pres-goal:last-child{border-right:none;}
.pres-goal-title{font-size:12px;font-weight:700;margin-bottom:2px;}
.pres-goal-sub{font-size:10px;color:rgba(255,255,255,.3);margin-bottom:6px;}
.pres-measure{display:flex;align-items:flex-start;gap:5px;font-size:10px;color:rgba(255,255,255,.5);margin-bottom:3px;line-height:1.3;}
.pres-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.pres-dot.ok{background:#34D399;}
.pres-dot.warn{background:#FBBF24;}
.pres-dot.crit{background:#F87171;}
.pres-dot.n{background:rgba(255,255,255,.2);}
.pres-badge{padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.pres-badge.fin{background:#C0392B;color:#fff;}
.pres-badge.kun{background:#E5007D;color:#fff;}
.pres-badge.pro{background:#C07000;color:#fff;}
.pres-badge.ler{background:#1E7A3E;color:#fff;}
.pres-status-pill{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;white-space:nowrap;}
.pres-status-pill.ok{background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.25);}
.pres-status-pill.warn{background:rgba(251,191,36,.15);color:#FBBF24;border:1px solid rgba(251,191,36,.25);}
.pres-status-pill.crit{background:rgba(248,113,113,.15);color:#F87171;border:1px solid rgba(248,113,113,.25);}
.pres-status-pill.n{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.12);}
.pres-footer{text-align:center;margin-top:20px;font-size:10px;color:rgba(255,255,255,.2);}

/* ARCHIV */
.archiv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.archiv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;cursor:pointer;transition:all .15s;}
.archiv-card:hover{border-color:var(--accent);}
.archiv-card.active-year{border-color:#E5007D;border-width:2px;background:#FDE8F3;}
.archiv-year{font-size:24px;font-weight:700;}
.archiv-stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.archiv-stat{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
.archiv-stat.ok{background:#EAFAF1;color:var(--ok);}
.archiv-stat.warn{background:#FEF9EC;color:var(--warn);}
.archiv-stat.crit{background:var(--fin-l);color:var(--crit);}
.new-year-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;max-width:440px;margin-top:16px;}
.new-year-form h3{font-size:14px;font-weight:600;margin-bottom:12px;}
.form-row{display:flex;gap:8px;}
.form-group{flex:1;}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}

.saved-toast{position:fixed;bottom:20px;right:20px;background:#E5007D;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .3s;z-index:999;}
.saved-toast.show{transform:translateY(0);opacity:1;}

@media(max-width:900px){
  .kpi-cards,.dash-summary,.pres-summary,.pres-kpi-strip{grid-template-columns:repeat(2,1fr);}
  .archiv-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .kpi-cards,.dash-summary,.pres-summary,.pres-kpi-strip{grid-template-columns:1fr 1fr;}
  .goals-edit-grid{grid-template-columns:1fr;}
  .goal-edit:nth-child(even){border-right:none;}
  .goal-edit{border-bottom:1px solid var(--border);}
  .goal-edit:last-child{border-bottom:none;}
}
</style>
</head>

// ── FORMATIERUNG ──────────────────────────────────────────────────────────
function fmtVal(v,format,unit){
  if(v===null||v===undefined||v==='') return '—';
  if(format==='mio') return (v/1000000).toFixed(1)+'M';
  if(format==='k'){
    if(v>=1000000) return (v/1000000).toFixed(2)+'M';
    if(v>=1000) return (v/1000).toFixed(0)+'K';
    return v.toFixed(0);
  }
  if(format==='val') return v%1===0?v.toFixed(0):parseFloat(v).toFixed(1);
  return v;
}
function fmtEur(v){
  if(v>=1000000) return (v/1000000).toFixed(2).replace('.',',')+'  Mio. €';
  return v.toLocaleString('de-AT')+'  €';
}
function statusColor(s){return s==='ok'?'var(--ok)':s==='warn'?'var(--warn)':s==='crit'?'var(--crit)':'#BDC3C7';}
function statusLabel(s){return s==='ok'?'Ziel erreicht':s==='warn'?'Im Plan':s==='crit'?'Handlungsbedarf':'Offen';}
function kpiStatus(ist,ziel,hb){
  if(!ist||ist===0) return 'n';
  const r=hb?ist/ziel:ziel/ist;
  if(r>=0.95) return 'ok';
  if(r>=0.80) return 'warn';
  return 'crit';
}
function kpiPct(ist,ziel,hb){
  if(!ist||ist===0) return 0;
  return Math.min(100,Math.round((hb?ist/ziel:ziel/ist)*100));
}
function calcSummary(data){
  let ok=0,warn=0,crit=0,total=0;
  data.perspectives.forEach(p=>p.goals.forEach(g=>{total++;if(g.status==='ok')ok++;else if(g.status==='warn')warn++;else if(g.status==='crit')crit++;}));
  return{ok,warn,crit,total};
}

function renderDashboard(){
  const data=getYearData();if(!data)return;
  const s=calcSummary(data);
  document.getElementById('dashSummary').innerHTML=`
    <div class="sum-card"><div class="sum-label">Strategische Ziele</div><div class="sum-val neu">${s.total}</div><div class="sum-sub">Geschäftsjahr ${currentYear}</div></div>
    <div class="sum-card"><div class="sum-label">Ziel erreicht</div><div class="sum-val ok">${s.ok}</div><div class="sum-sub">${Math.round(s.ok/s.total*100)}% aller Ziele</div></div>
    <div class="sum-card"><div class="sum-label">Im Plan</div><div class="sum-val warn">${s.warn}</div><div class="sum-sub">Beobachtung erforderlich</div></div>
    <div class="sum-card"><div class="sum-label">Handlungsbedarf</div><div class="sum-val crit">${s.crit}</div><div class="sum-sub">Maßnahmen nötig</div></div>`;

  // KPI Karten mit echten Zahlen
  document.getElementById('kpiCards').innerHTML = (data.kpis||[]).map(k=>{
    const pct = kpiPct(k.ist, k.ziel, k.higherBetter);
    const st = kpiStatus(k.ist, k.ziel, k.higherBetter);
    const barColor = st==='ok'?'var(--ok)':st==='warn'?'var(--warn)':st==='crit'?'var(--crit)':'#BDC3C7';
    const istDisp = k.ist>0 ? fmtVal(k.ist, k.format, k.unit) : '—';
    const zielDisp = fmtVal(k.ziel, k.format, k.unit);
    let deltaHtml = '';
    if(k.delta!==null && k.delta!==undefined){
      const pos = (k.higherBetter && k.delta>0)||(!k.higherBetter && k.delta<0);
      deltaHtml=`<div class="kpi-delta ${pos?'pos':k.delta===0?'neu':'neg'}">${k.delta>0?'+':''}${k.delta}% vs. Plan 2025</div>`;
    } else if(k.ist>0){
      const diff = k.ist - k.ziel;
      const pos = k.higherBetter ? diff>=0 : diff<=0;
      deltaHtml=`<div class="kpi-delta ${k.ist>0?(pos?'pos':'neg'):'neu'}">${k.ist>0?(pos?'✓ Ziel erreicht':'Δ '+(k.higherBetter?diff>0?'+':'':(diff<0?'+':''))+fmtVal(Math.abs(diff),k.format,k.unit)+' '+k.unit):'Kein Ist-Wert'}</div>`;
    } else {
      deltaHtml=`<div class="kpi-delta neu">Noch kein Ist-Wert</div>`;
    }
    return `<div class="kpi-card ${k.cls}">
      <div class="kpi-card-name">${k.name}</div>
      <div class="kpi-card-vals">
        <span class="kpi-ist ${st}">${istDisp}</span>
        <span class="kpi-ziel-txt">/ ${zielDisp} ${k.unit}</span>
      </div>
      <div class="kpi-bar-wrap"><div class="kpi-bar" style="width:${pct}%;background:${barColor};"></div></div>
      ${deltaHtml}
    </div>`;
  }).join('');

  // Perspektiven
  document.getElementById('dashPerspectives').innerHTML = data.perspectives.map(p=>`
    <div class="persp-block">
      <div class="persp-head">
        <span class="persp-badge ${p.cls}">${p.name}</span>
        <span class="persp-leitfrage">${p.leitfrage}</span>
      </div>
      <div class="persp-goals" style="display:grid;grid-template-columns:repeat(${Math.min(p.goals.length,4)},1fr);">
        ${p.goals.map(g=>`
          <div class="goal-card">
            <div class="goal-head ${p.cls}">
              <div class="goal-title ${p.cls}">${g.title}</div>
              <div class="goal-sub">${g.subtitle}</div>
            </div>
            <div class="goal-status-bar"><div class="status-bar-fill" style="width:100%;background:${statusColor(g.status)};opacity:.65;"></div></div>
            <div class="goal-body">
              ${g.measures.map(m=>`
                <div class="measure-row">
                  <div class="m-dot ${m.status}"></div>
                  <span class="m-text">${m.text}</span>
                  <span class="m-type ${m.type}">${m.type==='sp'?'Spät':'Früh'}</span>
                </div>`).join('')}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function updateGoalField(pi,gi,f,v){ bscData[currentYear].perspectives[pi].goals[gi][f]=v; }

  bscData[currentYear].perspectives[pi].goals[gi].status=v;

      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);">

        <div style="display:flex;gap:5px;flex-shrink:0;">
          ${badge(okN,'#4ADE80','rgba(74,222,128,.12)','✓')}
          ${badge(warnN,'#FBB140','rgba(251,177,64,.12)','~')}
          ${badge(critN,'#FF6FA8','rgba(255,111,168,.12)','⚠')}
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;">${goalRows}</table>
    </div>`;

  document.getElementById('presContent').innerHTML=`
    <div style="max-width:1100px;margin:0 auto;">

// ── ARCHIV ────────────────────────────────────────────────────────────────
function renderArchiv(){
  const years=getYears();
  document.getElementById('archivGrid').innerHTML=years.map(y=>{
    const d=bscData[y];const s=calcSummary(d);
    return `<div class="archiv-card ${y===currentYear?'active-year':''}">
      <div class="archiv-year">${y}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${s.total} strategische Ziele</div>
      <div class="archiv-stats">
        <span class="archiv-stat ok">✓ ${s.ok}</span>
        <span class="archiv-stat warn">⚠ ${s.warn}</span>
        ${s.crit?`<span class="archiv-stat crit">✗ ${s.crit}</span>`:''}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button class="btn btn-sm" onclick="switchYear('${y}');showSection('dashboard',document.querySelectorAll('.tab')[0])">Öffnen</button>
        ${y!==currentYear?`<button class="btn btn-sm btn-danger" onclick="deleteYear('${y}')">Löschen</button>`:''}
      </div>
    </div>`;
  }).join('');
  updateYearSelect();
}

function showNewYearForm(){
  const f=document.getElementById('newYearForm');
  const years=getYears();
  document.getElementById('newYearInput').value=String(parseInt(years[0])+1);
  document.getElementById('newYearBase').innerHTML=years.map(y=>`<option value="${y}">Kopie von ${y}</option>`).join('')+'<option value="empty">Leer starten</option>';
  f.style.display='block';
}
function createNewYear(){
  const y=document.getElementById('newYearInput').value.trim();
  const base=document.getElementById('newYearBase').value;
  if(!y||isNaN(y)){alert('Bitte gültiges Jahr eingeben.');return;}
  if(bscData[y]){alert('Jahr existiert bereits.');return;}
  const copy=JSON.parse(JSON.stringify(bscData[base==='empty'?currentYear:base]));
  if(base==='empty'){
    copy.perspectives.forEach(p=>p.goals.forEach(g=>{g.status='n';g.measures.forEach(m=>m.status='n');}));
    (copy.kpis||[]).forEach(k=>{k.ist=0;});
  }
  bscData[y]=copy;
  currentYear=y;
  saveData();
  document.getElementById('newYearForm').style.display='none';
  renderAll();
  showSection('dashboard',document.querySelectorAll('.tab')[0]);
}
function deleteYear(y){
  if(!confirm(`Jahr ${y} löschen?`))return;
  delete bscData[y];
  if(currentYear===y)currentYear=getYears()[0];
  saveData();renderAll();
}

function exportJSON(){
  const b=new Blob([JSON.stringify(bscData,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`stoelner_bsc_${currentYear}.json`;a.click();
}
function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);Object.assign(bscData,d);currentYear=Object.keys(d).sort((a,b)=>b-a)[0];saveData();renderAll();alert('Import erfolgreich!');}catch(err){alert('Ungültige JSON-Datei.');}};
  r.readAsText(file);
}

function showSection(name,tabEl){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  if(tabEl)tabEl.classList.add('active');
  if(name==='dashboard')renderDashboard();
  if(name==='edit')renderEdit();
  if(name==='presentation')renderPresentation();
  if(name==='archiv')renderArchiv();
}

function renderAll(){
  updateYearSelect();
  const active=document.querySelector('.section.active');
  if(active){const id=active.id.replace('section-','');
    if(id==='dashboard')renderDashboard();
    if(id==='edit')renderEdit();
    if(id==='presentation')renderPresentation();
    if(id==='archiv')renderArchiv();
  }
}


// ── GITHUB DEPLOY HELPER ──────────────────────────────────────────────────
function downloadUpdated(){
  saveData();
  const currentHtml = document.documentElement.outerHTML;
  const blob = new Blob([currentHtml], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  const t = document.getElementById('saved-toast');
  t.textContent = '↓ index.html gespeichert — jetzt auf GitHub hochladen';
  t.style.background = '#1A5F9E';
  t.classList.add('show');
  setTimeout(()=>{ t.classList.remove('show'); t.style.background=''; t.textContent='✓ Gespeichert'; }, 4500);
}
loadData();updateYearSelect();renderDashboard();
</script>
